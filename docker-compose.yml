services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_app_tester_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      # Use the backend service name inside Docker network
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
    # Install deps into the (mounted) /app/node_modules volume, then start Next dev server.
    # (Port is already set in package.json: `next dev -p 3000`)
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_app_tester_backend
    # NOTE: `env_file` removed because missing files make `docker compose` fail early.
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USER=postgres.mhrzpyfziiwxmfutlnwk
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_HOST=${DB_HOST:-aws-1-eu-west-3.pooler.supabase.com}
      # Use Supabase transaction pooling for app traffic to avoid exhausting session-mode connections.
      - DB_PORT=${DB_PORT:-6543}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - redis
    networks:
      - app-network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_app_tester_celery
    # NOTE: `env_file` removed because missing files make `docker compose` fail early.
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USER=postgres.mhrzpyfziiwxmfutlnwk
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_HOST=${DB_HOST:-aws-1-eu-west-3.pooler.supabase.com}
      # Use Supabase transaction pooling for worker traffic as well.
      - DB_PORT=${DB_PORT:-6543}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
    command: celery -A core worker --loglevel=info --concurrency=1
    depends_on:
      - redis
      - backend
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: ai_app_tester_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

volumes:
  backend_media:
  backend_static:
  redis_data:


networks:
  app-network:
    driver: bridge
