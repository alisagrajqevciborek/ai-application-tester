# Deploy backend to Azure Container Apps (Germany West Central) on push to main.
# Secrets: AZURE_CREDENTIALS (JSON from az ad sp create-for-rbac), NEXT_PUBLIC_API_URL (backend API URL for frontend builds).

name: Deploy production (Azure)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: ai-application-tester
  ACR_NAME: aiapptesteracrgwc
  CONTAINER_APP_BACKEND: ai-app-backend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push backend image
        run: |
          set -e
          cd backend
          az acr build \
            --registry "${{ env.ACR_NAME }}" \
            --image "ai-app-backend:${{ github.sha }}" \
            --image ai-app-backend:latest \
            --platform linux \
            --file Dockerfile . \
            --no-logs

      - name: Deploy backend Container App
        run: |
          az containerapp update \
            --name "${{ env.CONTAINER_APP_BACKEND }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.ACR_NAME }}.azurecr.io/ai-app-backend:${{ github.sha }}"

  # Fails until frontend TypeScript build passes (e.g. report-view.tsx types). Does not block backend.
  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Write frontend .env.production
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > frontend/.env.production

      # Stops at `npm run build` until TypeScript errors in the frontend are resolved.
      - name: Build and push frontend image
        continue-on-error: true
        run: |
          set -e
          cd frontend
          az acr build \
            --registry "${{ env.ACR_NAME }}" \
            --image "ai-app-frontend:${{ github.sha }}" \
            --image ai-app-frontend:latest \
            --platform linux \
            --file Dockerfile . \
            --no-logs

      # After the first successful frontend image build, create Container App `ai-app-frontend` once in Azure,
      # then add a step here to `az containerapp update` with the new image tag.
